name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck, lint & E2E
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_AZURE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_AZURE_CLIENT_ID }}
      NEXT_PUBLIC_AZURE_AUTHORITY: ${{ secrets.NEXT_PUBLIC_AZURE_AUTHORITY }}
      NEXT_PUBLIC_AZURE_API_SCOPE: ${{ secrets.NEXT_PUBLIC_AZURE_API_SCOPE }}
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm exec playwright test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  docker-build:
    name: Docker build & smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t alumbrera-web:${{ github.sha }} \
            --build-arg NEXT_PUBLIC_AZURE_CLIENT_ID=placeholder \
            --build-arg NEXT_PUBLIC_AZURE_AUTHORITY=https://placeholder.ciamlogin.com/placeholder \
            --build-arg NEXT_PUBLIC_AZURE_API_SCOPE=placeholder \
            --build-arg NEXT_PUBLIC_API_BASE_URL=http://localhost:3001 \
            .

      - name: Smoke test the image
        run: |
          docker run -d --name web-smoke -p 3000:3000 \
            alumbrera-web:${{ github.sha }}
          sleep 10
          docker logs web-smoke
          curl --fail --retry 3 --retry-delay 3 http://localhost:3000 || \
            (docker logs web-smoke; docker rm -f web-smoke; exit 1)
          docker rm -f web-smoke
